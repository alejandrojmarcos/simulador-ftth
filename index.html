
<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Simulador FTTH v7</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#f0f4f8;--sur:#fff;--sur2:#f7f9fc;--brd:#d1dce8;--brd2:#e8eef5;
  --txt:#1a2535;--txt2:#5a7090;--txt3:#96abbe;
  --acc:#0066cc;--acc2:#004a99;
  --g:#16a34a;--y:#b45309;--o:#c2410c;--r:#dc2626;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
*{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{background:var(--bg);color:var(--txt);font-family:var(--sans);display:flex;flex-direction:column}

/* HEADER */
header{background:var(--sur);border-bottom:1px solid var(--brd);padding:6px 14px;
  display:flex;align-items:center;justify-content:space-between;flex-shrink:0;
  box-shadow:0 1px 3px rgba(0,0,0,.06);gap:12px}
.logo{display:flex;align-items:center;gap:9px;flex-shrink:0}
.logo-icon{width:30px;height:30px;background:linear-gradient(135deg,#0066cc,#0044aa);
  border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:14px}
.logo-title{font-size:11px;font-weight:700;color:var(--txt)}
.logo-sub{font-size:7.5px;color:var(--txt3);font-family:var(--mono);letter-spacing:.6px;text-transform:uppercase}

/* Topology selector pills */
.topo-sel{display:flex;gap:4px;background:var(--sur2);border:1px solid var(--brd);
  border-radius:8px;padding:3px}
.tpill{padding:4px 10px;border-radius:6px;cursor:pointer;font-family:var(--mono);
  font-size:8.5px;font-weight:600;letter-spacing:.4px;text-transform:uppercase;
  color:var(--txt3);transition:all .15s;white-space:nowrap}
.tpill.active{background:var(--acc);color:#fff;box-shadow:0 1px 3px rgba(0,102,204,.3)}
.tpill:hover:not(.active){color:var(--txt);background:var(--brd2)}

.hdr-kpis{display:flex;gap:16px}
.kpi{text-align:center}
.kpi-lbl{font-size:7px;text-transform:uppercase;letter-spacing:.8px;color:var(--txt3);font-family:var(--mono)}
.kpi-val{font-size:12px;font-weight:700;font-family:var(--mono)}
.kv-ok{color:var(--g)}.kv-wn{color:var(--y)}.kv-er{color:var(--r)}
.hdr-btns{display:flex;gap:6px;flex-shrink:0}
.hbtn{padding:4px 10px;border-radius:5px;border:1px solid var(--brd);cursor:pointer;
  font-family:var(--mono);font-size:9px;font-weight:600;text-transform:uppercase;transition:all .15s}
.hbtn-s{background:var(--sur2);color:var(--txt2)}.hbtn-s:hover{background:var(--brd2)}

/* WORKSPACE */
.workspace{flex:1;display:flex;flex-direction:column;overflow:hidden;min-height:0}
.net-area{flex:1;overflow:auto;min-height:0;position:relative;cursor:grab;background:var(--bg)}
.net-area:active{cursor:grabbing}
#svg-wrap{transform-origin:top left;display:inline-block;padding:10px 14px}
#svg{display:block}

/* ZOOM BAR */
.zoom-bar{position:absolute;bottom:10px;right:14px;display:flex;align-items:center;gap:5px;
  background:var(--sur);border:1px solid var(--brd);border-radius:7px;padding:4px 9px;
  box-shadow:0 2px 8px rgba(0,0,0,.1);z-index:20}
.zbtn{width:24px;height:24px;border-radius:4px;border:1px solid var(--brd);background:var(--sur2);
  cursor:pointer;font-size:14px;font-weight:700;color:var(--txt2);
  display:flex;align-items:center;justify-content:center;transition:all .12s;user-select:none}
.zbtn:hover{background:var(--brd2);color:var(--txt)}
.zoom-pct{font-family:var(--mono);font-size:9.5px;font-weight:600;color:var(--txt2);min-width:36px;text-align:center}

/* BOTTOM PANEL */
.bot{background:var(--sur);border-top:2px solid var(--brd);flex-shrink:0;display:flex;flex-direction:column}
.ptabs{display:flex;border-bottom:1px solid var(--brd);background:var(--sur2);overflow-x:auto}
.ptab{padding:6px 11px;font-size:8.5px;font-weight:600;letter-spacing:.6px;text-transform:uppercase;
  cursor:pointer;color:var(--txt3);border-bottom:2px solid transparent;margin-bottom:-1px;
  font-family:var(--mono);transition:all .15s;white-space:nowrap}
.ptab.on{color:var(--acc);border-bottom-color:var(--acc);background:var(--sur)}
.ptab:hover:not(.on){color:var(--txt)}
.pbody{padding:8px 11px;display:none;overflow-x:auto;overflow-y:auto;
  gap:8px;align-items:flex-start;max-height:220px}
.pbody.on{display:flex}
.pc{background:var(--sur2);border:1px solid var(--brd2);border-radius:6px;
  padding:8px 10px;flex-shrink:0;min-width:145px}
.pct{font-size:7.5px;font-weight:700;letter-spacing:2px;text-transform:uppercase;
  color:var(--acc);font-family:var(--mono);margin-bottom:6px;display:flex;align-items:center;gap:5px}
.pct::after{content:'';flex:1;height:1px;background:var(--brd2)}
.pr{display:flex;align-items:center;justify-content:space-between;gap:6px;margin-bottom:4px}
.pr:last-child{margin-bottom:0}
.pl{font-size:8px;color:var(--txt2);font-family:var(--mono);white-space:nowrap}
.pi{width:58px;background:var(--sur);border:1px solid var(--brd);color:var(--txt);
  font-family:var(--mono);font-size:9px;padding:3px 5px;border-radius:4px;text-align:right;outline:none}
.pi:focus{border-color:var(--acc)}
.ps{background:var(--sur);border:1px solid var(--brd);color:var(--txt);
  font-family:var(--mono);font-size:8px;padding:3px 5px;border-radius:4px;outline:none;cursor:pointer}
.srow{display:flex;align-items:center;gap:5px;margin-bottom:3px}
.srow label{font-size:8px;color:var(--txt2);font-family:var(--mono);width:110px;flex-shrink:0}
.srow input[type=range]{-webkit-appearance:none;height:3px;background:var(--brd);border-radius:2px;outline:none;width:85px}
.srow input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:11px;height:11px;border-radius:50%;background:var(--acc);cursor:pointer}
.sv{font-size:8px;font-family:var(--mono);color:var(--o);width:36px;text-align:right}
.tog{width:28px;height:16px;border-radius:8px;border:1px solid var(--brd);cursor:pointer;
  position:relative;transition:all .2s;flex-shrink:0}
.tog.off{background:var(--sur)}.tog.on{background:var(--r);border-color:var(--r)}
.tog::after{content:'';position:absolute;width:10px;height:10px;border-radius:50%;top:2px;transition:left .2s;box-shadow:0 1px 2px rgba(0,0,0,.2)}
.tog.off::after{left:2px;background:var(--brd)}.tog.on::after{left:14px;background:#fff}
.log-inner{overflow-y:auto;font-family:var(--mono);font-size:9px;line-height:1.85;max-height:180px}
.log-inner::-webkit-scrollbar{width:3px}
.log-inner::-webkit-scrollbar-thumb{background:var(--brd);border-radius:2px}
.lts{color:var(--txt3)}.lok{color:var(--g)}.lwn{color:var(--y)}.ler{color:var(--r)}.linf{color:var(--acc)}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px}
.ncb{width:24px;height:20px;border-radius:3px;border:1px solid var(--brd);cursor:pointer;
  font-family:var(--mono);font-size:8.5px;font-weight:600;background:var(--sur2);
  color:var(--txt2);display:inline-flex;align-items:center;justify-content:center;transition:all .15s;margin-right:2px}
.ncb.sel{background:var(--acc);color:#fff;border-color:var(--acc)}
.ncb:hover:not(.sel){background:var(--brd2)}
</style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">📡</div>
    <div>
      <div class="logo-title" id="logo-title">Simulador FTTH</div>
      <div class="logo-sub" id="logo-sub">Seleccioná una topología</div>
    </div>
  </div>

  <!-- TOPOLOGY SELECTOR -->
  <div class="topo-sel">
    <div class="tpill active" id="tp-desbal" onclick="setTopo('desbal')">Desbalanceada</div>
    <div class="tpill" id="tp-hubpreco" onclick="setTopo('hubpreco')">HUB Preco 1×8</div>
    <div class="tpill" id="tp-fusionada" onclick="setTopo('fusionada')">Fusionada</div>
  </div>

  <div class="hdr-kpis">
    <div class="kpi"><div class="kpi-lbl">OLT TX</div><div class="kpi-val kv-ok" id="h-olt">+4.0 dBm</div></div>
    <div class="kpi"><div class="kpi-lbl">ONUs activas</div><div class="kpi-val kv-ok" id="h-onus">–/–</div></div>
    <div class="kpi"><div class="kpi-lbl">Fallas</div><div class="kpi-val kv-ok" id="h-faults">0</div></div>
  </div>
  <div class="hdr-btns">
    <button class="hbtn hbtn-s" onclick="resetAll()">↺ Reset</button>
    <button class="hbtn hbtn-s" onclick="doMeasure()">⚡ Medición</button>
  </div>
</header>

<div class="workspace">
  <div class="net-area" id="net-area">
    <div id="svg-wrap">
      <svg id="svg" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <filter id="sh"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-opacity=".08"/></filter>
          <filter id="glow"><feGaussianBlur stdDeviation="1.5" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
        </defs>
      </svg>
    </div>
    <div class="zoom-bar">
      <div class="zbtn" onclick="adjustZoom(-0.15)">−</div>
      <div class="zoom-pct" id="zoom-pct">100%</div>
      <div class="zbtn" onclick="adjustZoom(+0.15)">+</div>
      <div class="zbtn" onclick="setZoom(1)" style="font-size:8px;width:30px">1:1</div>
      <div class="zbtn" onclick="fitZoom()" style="font-size:11px;width:26px">⊡</div>
    </div>
  </div>

  <div class="bot">
    <div class="ptabs" id="ptabs-container"></div>
    <div id="panel-bodies"></div>
  </div>
</div>

<script>
// ════════════════════════════════════════════════════════
//  GLOBALS
// ════════════════════════════════════════════════════════
const INF = -99;
const NS  = 'http://www.w3.org/2000/svg';

let currentTopo = 'desbal';

// ── Per-topology state ──────────────────────────────────
// Each topology has its own independent state object
const STATE = {
  desbal: {
    olt: 4.0,
    brOn: {a:true, b:true},
    indep: false,
    r1a:70, r2a:70, r3a:70,
    r1b:70, r2b:70, r3b:70,
    // fiber lengths
    len: {a:{hc1:50,c1c2:80,c2c3:100,c3c4:80}, b:{hc1:50,c1c2:80,c2c3:100,c3c4:80}},
    // extra drop attenuation per segment
    xdrop: {a:{hc1:0,c1c2:0,c2c3:0,c3c4:0}, b:{hc1:0,c1c2:0,c2c3:0,c3c4:0}},
    // splitter losses (shared with physics)
    lh:3.8, lhe:0.0, ls8:10.5, ls8e:0.0, ls2e:0.2, lfib:0.35,
    conBase:0.3, conOnu:0.3,
    onuDropM:30,
    // faults
    F: {'sp-hub':0,'sp-c1':0,'sp-c2':0,'sp-c3':0,
        's8-a1':0,'s8-a2':0,'s8-a3':0,'s8-a4':0,
        's8-b1':0,'s8-b2':0,'s8-b3':0,'s8-b4':0,
        'cut-olt':false,
        'cut-a-hc1':false,'cut-a-c1c2':false,'cut-a-c2c3':false,'cut-a-c3c4':false,
        'cut-b-hc1':false,'cut-b-c1c2':false,'cut-b-c2c3':false,'cut-b-c3c4':false},
    ctoKeys: ['a1','a2','a3','a4','b1','b2','b3','b4'],
    nOnu: {a1:1,a2:1,a3:1,a4:1,b1:1,b2:1,b3:1,b4:1},
    onuAtt: null, // built in init
  },

  hubpreco: {
    olt: 4.0,
    lenHub: {c1:80,c2:80,c3:80,c4:80,c5:80,c6:80,c7:80,c8:80},
    xdropHub: {c1:0,c2:0,c3:0,c4:0,c5:0,c6:0,c7:0,c8:0},
    lh8:10.5, lh8e:0.0,
    ls8:10.5, ls8e:0.0,
    lfib:0.35, conBase:0.3, conOnu:0.3, onuDropM:30,
    ctoOn: {c1:true,c2:true,c3:true,c4:true,c5:true,c6:true,c7:true,c8:true},
    F: {'sp-hub8':0,
        's8-c1':0,'s8-c2':0,'s8-c3':0,'s8-c4':0,
        's8-c5':0,'s8-c6':0,'s8-c7':0,'s8-c8':0,
        'cut-olt':false,
        'cut-c1':false,'cut-c2':false,'cut-c3':false,'cut-c4':false,
        'cut-c5':false,'cut-c6':false,'cut-c7':false,'cut-c8':false},
    ctoKeys: ['c1','c2','c3','c4','c5','c6','c7','c8'],
    nOnu: {c1:1,c2:1,c3:1,c4:1,c5:1,c6:1,c7:1,c8:1},
    onuAtt: null,
  },

  fusionada: {
    olt: 4.0,
    lenBandeja: 200,
    lenCTO: {c1:100,c2:100,c3:100,c4:100,c5:100,c6:100,c7:100,c8:100},
    xdropCTO: {c1:0,c2:0,c3:0,c4:0,c5:0,c6:0,c7:0,c8:0},
    spliceLoss: 0.05,
    ls8:10.5, ls8e:0.0,
    lfib:0.35, conBase:0.3, conOnu:0.3, onuDropM:30,
    ctoOn: {c1:true,c2:true,c3:true,c4:true,c5:true,c6:true,c7:true,c8:true},
    F: {'sp-bandeja':0,
        's8-c1':0,'s8-c2':0,'s8-c3':0,'s8-c4':0,
        's8-c5':0,'s8-c6':0,'s8-c7':0,'s8-c8':0,
        'cut-olt':false,
        'cut-c1':false,'cut-c2':false,'cut-c3':false,'cut-c4':false,
        'cut-c5':false,'cut-c6':false,'cut-c7':false,'cut-c8':false},
    ctoKeys: ['c1','c2','c3','c4','c5','c6','c7','c8'],
    nOnu: {c1:1,c2:1,c3:1,c4:1,c5:1,c6:1,c7:1,c8:1},
    onuAtt: null,
  }
};

// Init onuAtt for all topos
['desbal','hubpreco','fusionada'].forEach(tp=>{
  const s = STATE[tp];
  s.onuAtt = {};
  s.ctoKeys.forEach(ck=>{ s.onuAtt[ck]={}; for(let i=1;i<=8;i++) s.onuAtt[ck]['p'+i]=1.0; });
});

function S(){ return STATE[currentTopo]; }

// ════════════════════════════════════════════════════════
//  COLOR HELPERS (shared)
// ════════════════════════════════════════════════════════
function fmt(v){ if(v===null||v<=INF+5) return null; return (v>=0?'+':'')+v.toFixed(1); }

function valC(v){
  if(v===null||v<=INF+5) return '#dc2626';
  if(v>=-24) return '#15803d';
  if(v>=-27) return '#854d0e';
  if(v>=-30) return '#9a3412';
  return '#dc2626';
}
function lineC(v){
  if(v===null||v<=INF+5) return '#e5e7eb';
  if(v>=-24) return '#0066cc'; if(v>=-27) return '#d97706'; if(v>=-30) return '#ea580c';
  return '#ef4444';
}
const ONU_C = {
  ok:   {bg:'#f0fdf4',brd:'#16a34a',txt:'#14532d',lbl:'OK'},
  weak: {bg:'#fefce8',brd:'#ca8a04',txt:'#713f12',lbl:'DEB'},
  crit: {bg:'#fff7ed',brd:'#ea580c',txt:'#7c2d12',lbl:'CRIT'},
  off:  {bg:'#fef2f2',brd:'#dc2626',txt:'#991b1b',lbl:'SIN'},
};
function onuState(rx){
  if(rx===null||rx<=INF+5) return 'off';
  if(rx>=-24) return 'ok'; if(rx>=-27) return 'weak'; if(rx>=-30) return 'crit';
  return 'off';
}
function ctoColors(onuV, inV){
  if(inV<=INF+5)  return {bg:'#fef2f2',brd:'#dc2626',brdW:3,hdr:'#dc2626',title:'#fff',sub:'#fecaca'};
  if(onuV>=-24)   return {bg:'#ffffff',brd:'#93c5fd',brdW:1.5,hdr:'#dbeafe',title:'#1e40af',sub:'#64748b'};
  if(onuV>=-27)   return {bg:'#fefce8',brd:'#eab308',brdW:3,hdr:'#eab308',title:'#422006',sub:'#713f12'};
  if(onuV>=-30)   return {bg:'#fff7ed',brd:'#f97316',brdW:3,hdr:'#f97316',title:'#fff',sub:'#7c2d12'};
  return           {bg:'#fef2f2',brd:'#dc2626',brdW:3,hdr:'#dc2626',title:'#fff',sub:'#fecaca'};
}

// ════════════════════════════════════════════════════════
//  SVG PRIMITIVES
// ════════════════════════════════════════════════════════
function mkEl(tag, attrs){
  const e=document.createElementNS(NS,tag);
  if(attrs) for(const[k,v] of Object.entries(attrs)) e.setAttribute(k,String(v));
  return e;
}
function mkTxt(s, attrs){ const e=mkEl('text',attrs); e.textContent=String(s); return e; }
function mkLine(x1,y1,x2,y2,attrs){ return mkEl('line',{x1,y1,x2,y2,...attrs}); }

// ════════════════════════════════════════════════════════
//  LAYOUT CONSTANTS (shared)
// ════════════════════════════════════════════════════════
const PAD=14, OLT_W=72, HUB_W=56;
const CTO_W=178, CTO_H=120;
const ONU_W=120, ONU_H=58, ONU_GAP=10, ONU_DRP=40, PORT_DOT=5;

// ════════════════════════════════════════════════════════
//  PHYSICS HELPERS
// ════════════════════════════════════════════════════════
function sp18loss(topo, key){
  // SP 1×8 loss for a given CTO key
  const s = STATE[topo];
  const fault = s.F['s8-'+key]||0;
  const base  = topo==='desbal' ? (s.ls8+s.ls8e) : (s.ls8+s.ls8e);
  return base + fault;
}
function fiberLoss(m, topo){
  return (m/1000)*(STATE[topo].lfib||0.35);
}
function trunkLoss(m, xtra, topo){
  const con = STATE[topo].conBase||0.3;
  return 2*con + fiberLoss(m,topo) + (xtra||0);
}
function onuDropLoss(ctoKey, portKey, topo){
  const s = STATE[topo];
  const con = s.conOnu||0.3;
  return con + fiberLoss(s.onuDropM||0, topo) + (s.onuAtt[ctoKey][portKey]||0);
}

// ════════════════════════════════════════════════════════
//  CALCULATORS — one per topology
// ════════════════════════════════════════════════════════
function calcDesbal(){
  const s = STATE.desbal;
  const T = {olt:s.olt};
  const F = s.F;
  const sp18 = (s.ls8+s.ls8e);
  const sp2exc = s.ls2e||0.2;
  const hubLoss = (s.lh+s.lhe) + (F['sp-hub']||0);
  function spP(r){ return -(10*Math.log10(r/100))+sp2exc; }
  function spT(r){ return -(10*Math.log10((100-r)/100))+sp2exc; }
  function tl(m,xtra){ return trunkLoss(m,xtra,'desbal'); }

  T.pre_hub = F['cut-olt'] ? INF : s.olt;
  const hub = T.pre_hub<=INF+5 ? INF : T.pre_hub - hubLoss;

  function branch(br){
    const on = s.brOn[br];
    const rr = s.indep
      ? [s[`r1${br}`],s[`r2${br}`],s[`r3${br}`]]
      : [s.r1a,s.r2a,s.r3a];
    const len = s.len[br]; const xd = s.xdrop[br];
    const spc = ['sp-c1','sp-c2','sp-c3'];
    const s8k = [`s8-${br}1`,`s8-${br}2`,`s8-${br}3`,`s8-${br}4`];
    const cuts = {hc1:F[`cut-${br}-hc1`],c12:F[`cut-${br}-c1c2`],c23:F[`cut-${br}-c2c3`],c34:F[`cut-${br}-c3c4`]};

    if(!on){ ['1','2','3','4'].forEach(i=>{ T[`${br}${i}_in`]=INF;T[`${br}${i}_pass`]=INF;T[`${br}${i}_tap`]=INF;T[`${br}${i}_onu`]=INF; }); return; }

    T[`${br}1_in`]   = (hub<=INF+5||cuts.hc1)  ? INF : hub - tl(len.hc1,xd.hc1);
    const in1=T[`${br}1_in`];
    T[`${br}1_pass`] = in1<=INF+5?INF: in1-spP(rr[0])-(F[spc[0]]||0);
    T[`${br}1_tap`]  = in1<=INF+5?INF: in1-spT(rr[0])-(F[spc[0]]||0);
    T[`${br}1_onu`]  = T[`${br}1_tap`]<=INF+5?INF: T[`${br}1_tap`]-sp18-(F[s8k[0]]||0);

    T[`${br}2_in`]   = (T[`${br}1_pass`]<=INF+5||cuts.c12) ? INF : T[`${br}1_pass`] - tl(len.c1c2,xd.c1c2);
    const in2=T[`${br}2_in`];
    T[`${br}2_pass`] = in2<=INF+5?INF: in2-spP(rr[1])-(F[spc[1]]||0);
    T[`${br}2_tap`]  = in2<=INF+5?INF: in2-spT(rr[1])-(F[spc[1]]||0);
    T[`${br}2_onu`]  = T[`${br}2_tap`]<=INF+5?INF: T[`${br}2_tap`]-sp18-(F[s8k[1]]||0);

    T[`${br}3_in`]   = (T[`${br}2_pass`]<=INF+5||cuts.c23) ? INF : T[`${br}2_pass`] - tl(len.c2c3,xd.c2c3);
    const in3=T[`${br}3_in`];
    T[`${br}3_pass`] = in3<=INF+5?INF: in3-spP(rr[2])-(F[spc[2]]||0);
    T[`${br}3_tap`]  = in3<=INF+5?INF: in3-spT(rr[2])-(F[spc[2]]||0);
    T[`${br}3_onu`]  = T[`${br}3_tap`]<=INF+5?INF: T[`${br}3_tap`]-sp18-(F[s8k[2]]||0);

    T[`${br}4_in`]   = (T[`${br}3_pass`]<=INF+5||cuts.c34) ? INF : T[`${br}3_pass`] - tl(len.c3c4,xd.c3c4);
    T[`${br}4_pass`]=INF; T[`${br}4_tap`]=INF;
    T[`${br}4_onu`]  = T[`${br}4_in`]<=INF+5?INF: T[`${br}4_in`]-sp18-(F[s8k[3]]||0);
  }
  branch('a'); branch('b');
  return T;
}

function calcHubPreco(){
  const s = STATE.hubpreco;
  const F = s.F;
  const T = {olt:s.olt};
  T.pre_hub = F['cut-olt'] ? INF : s.olt;
  const hubLoss = (s.lh8+s.lh8e) + (F['sp-hub8']||0);
  const hub = T.pre_hub<=INF+5 ? INF : T.pre_hub - hubLoss;

  for(let i=1;i<=8;i++){
    const ck = 'c'+i;
    const cut = F['cut-'+ck];
    const m   = s.lenHub[ck]||80;
    const xd  = s.xdropHub[ck]||0;
    T[ck+'_in'] = (hub<=INF+5||cut) ? INF : hub - trunkLoss(m,xd,'hubpreco');
    T[ck+'_onu'] = T[ck+'_in']<=INF+5 ? INF : T[ck+'_in'] - (s.ls8+s.ls8e) - (F['s8-'+ck]||0);
  }
  return T;
}

function calcFusionada(){
  const s = STATE.fusionada;
  const F = s.F;
  const T = {olt:s.olt};
  T.pre_bandeja = F['cut-olt'] ? INF : s.olt;
  // Troncal a la bandeja: fibra + 1 fusión en cada extremo (2 splices)
  const troncalLoss = fiberLoss(s.lenBandeja||200,'fusionada') + 2*(s.spliceLoss||0.05);
  const bandejaIn = T.pre_bandeja<=INF+5 ? INF : T.pre_bandeja - troncalLoss;
  // SP 1×8 en bandeja
  const sp8base = (s.ls8+s.ls8e) + (F['sp-bandeja']||0);
  const bandejaOut = bandejaIn<=INF+5 ? INF : bandejaIn - sp8base;

  for(let i=1;i<=8;i++){
    const ck = 'c'+i;
    const cut = F['cut-'+ck];
    const m   = s.lenCTO[ck]||100;
    const xd  = s.xdropCTO[ck]||0;
    // Fusionada: no connectors on intermediate splices, just splice loss + fiber
    const dropLoss = fiberLoss(m,'fusionada') + 2*(s.spliceLoss||0.05) + (xd||0);
    T[ck+'_in'] = (bandejaOut<=INF+5||cut) ? INF : bandejaOut - dropLoss;
    T[ck+'_onu'] = T[ck+'_in']<=INF+5 ? INF : T[ck+'_in'] - (s.ls8+s.ls8e) - (F['s8-'+ck]||0);
  }
  T.bandejaIn=bandejaIn; T.bandejaOut=bandejaOut;
  return T;
}

function calc(){
  if(currentTopo==='desbal')    return calcDesbal();
  if(currentTopo==='hubpreco')  return calcHubPreco();
  if(currentTopo==='fusionada') return calcFusionada();
}

function drawONUsBelow(svg,ctoX,ctoTopY,ctoKey,onuV,topo,colX,colW){
  const s=STATE[topo];
  const n=s.nOnu[ctoKey]; if(n===0) return;
  const onuRowW=n*ONU_W+(n-1)*ONU_GAP;
  const startX=colX+(colW-onuRowW)/2;
  const topY=ctoTopY+CTO_H+ONU_DRP;

  for(let pi=0;pi<n;pi++){
    const pk='p'+(pi+1);
    const portPct=(pi+0.5)/n;
    const portX=ctoX+portPct*CTO_W;
    const portY=ctoTopY+CTO_H;
    const onuLX=startX+pi*(ONU_W+ONU_GAP);
    const onuCX=onuLX+ONU_W/2;
    const dotC=valC(onuV);

    // Port dot
    svg.appendChild(mkEl('circle',{cx:portX,cy:portY,r:PORT_DOT,fill:onuV<=INF+5?'#e5e7eb':'white',stroke:dotC,'stroke-width':1.5}));
    svg.appendChild(mkTxt(pi+1,{x:portX,y:portY+3.5,'text-anchor':'middle','font-family':"'IBM Plex Mono'",'font-size':5.5,'font-weight':700,fill:dotC}));
    if(fmt(onuV)){
      svg.appendChild(mkTxt(fmt(onuV)+' dBm',{x:portX,y:portY+15,'text-anchor':'middle','font-family':"'IBM Plex Mono'",'font-size':7,'font-weight':500,fill:valC(onuV)}));
    }

    // Drop wire elbow
    const midY=portY+ONU_DRP/2;
    const dropC=lineC(onuV); const dropO=onuV<=INF+5?0.2:0.85;
    svg.appendChild(mkEl('line',{x1:portX,y1:portY+PORT_DOT,x2:portX,y2:midY,stroke:dropC,'stroke-width':1.2,opacity:dropO,'stroke-dasharray':'3,2'}));
    svg.appendChild(mkEl('line',{x1:portX,y1:midY,x2:onuCX,y2:midY,stroke:dropC,'stroke-width':1.2,opacity:dropO,'stroke-dasharray':'3,2'}));
    svg.appendChild(mkEl('line',{x1:onuCX,y1:midY,x2:onuCX,y2:topY,stroke:dropC,'stroke-width':1.2,opacity:dropO,'stroke-dasharray':'3,2'}));

    // ONU card
    const rxOnu = onuV<=INF+5 ? INF : onuV - onuDropLoss(ctoKey,pk,topo);
    drawONUCard(svg,onuLX,topY,ctoKey,pk,onuV,rxOnu,topo);
  }
}

function colLayout(ctoKeys, topo){
  // Returns array of {colX, ctoX, colW} for each CTO index
  const s=STATE[topo];
  const result=[];
  let cx=PAD+OLT_W+14+HUB_W+28;
  ctoKeys.forEach(ck=>{
    const n=s.nOnu[ck]||0;
    const onuRowW=n>0?n*ONU_W+(n-1)*ONU_GAP:0;
    const colW=Math.max(CTO_W, onuRowW);
    result.push({colX:cx, ctoX:cx+(colW-CTO_W)/2, colW});
    cx+=colW+52;
  });
  return {cols:result, totalW:cx-52+PAD};
}

//  BUILD SVG — DESBALANCEADA
// ════════════════════════════════════════════════════════
function buildDesbal(T){
  const svg=document.getElementById('svg');
  while(svg.children.length>1) svg.removeChild(svg.lastChild);
  const s=STATE.desbal;
  const activeBr=['a','b'].filter(b=>s.brOn[b]);

  // Compute column widths from max across both branches
  const s2=STATE.desbal;
  const allKeys=[['a1','a2','a3','a4'],['b1','b2','b3','b4']];
  const colData=[];
  let cx=PAD+OLT_W+14+HUB_W+28;
  for(let ci=0;ci<4;ci++){
    const keys=activeBr.map(br=>allKeys[br==='a'?0:1][ci]);
    const maxNOnu=Math.max(...keys.map(k=>s2.nOnu[k]||0));
    const onuRowW=maxNOnu>0?maxNOnu*ONU_W+(maxNOnu-1)*ONU_GAP:0;
    const colW=Math.max(CTO_W,onuRowW);
    colData.push({colX:cx, ctoX:cx+(colW-CTO_W)/2, colW});
    cx+=colW+52;
  }
  const svgW=cx-52+PAD;

  // Row heights
  function brRowH(br){
    const keys=br==='a'?['a1','a2','a3','a4']:['b1','b2','b3','b4'];
    const maxN=Math.max(...keys.map(k=>s.nOnu[k]||0));
    return CTO_H+(maxN>0?ONU_DRP+ONU_H+12:12);
  }
  const rowTopY=[]; let ry=PAD+16;
  activeBr.forEach(br=>{ rowTopY.push(ry); ry+=brRowH(br)+48; });
  const svgH=ry-48+PAD+16;

  svg.setAttribute('viewBox',`0 0 ${svgW} ${svgH}`);
  svg.setAttribute('width',svgW); svg.setAttribute('height',svgH);
  svg.appendChild(mkEl('rect',{x:0,y:0,width:svgW,height:svgH,fill:'#f0f4f8'}));

  // Lane backgrounds
  activeBr.forEach((br,ri)=>{
    const rh=brRowH(br);
    svg.appendChild(mkEl('rect',{x:8,y:rowTopY[ri]-4,width:svgW-16,height:rh+8,rx:8,fill:'rgba(0,102,204,.025)',stroke:'rgba(0,102,204,.07)','stroke-width':1}));
    svg.appendChild(mkTxt(`RAMA ${br.toUpperCase()}`,{x:18,y:rowTopY[ri]+8,'font-family':"'IBM Plex Sans'",'font-size':8,'font-weight':700,fill:'#0066cc',opacity:.5,'letter-spacing':3}));
  });

  const oltCY=activeBr.length===2?(rowTopY[0]+CTO_H/2+rowTopY[1]+CTO_H/2)/2:rowTopY[0]+CTO_H/2;
  drawOLT(svg,PAD,oltCY,T.olt);

  // Hub SP 1×2
  const hubLoss=(s.lh+s.lhe+(s.F['sp-hub']||0)).toFixed(1);
  const hubFault=(s.F['sp-hub']||0)>0;
  const hubX=PAD+OLT_W+14;
  drawSplitterBox(svg,hubX,oltCY,'HUB','SP 1×2  50/50',`−${hubLoss} dB`,2,
    activeBr.length===2?[oltCY-10,oltCY+10]:[oltCY],hubFault);

  drawWire(svg,PAD+OLT_W,oltCY,hubX,oltCY,T.pre_hub,3,true);

  activeBr.forEach((br,ri)=>{
    const rowY=rowTopY[ri]; const brCY=rowY+CTO_H/2;
    const ctoKeys=[`${br}1`,`${br}2`,`${br}3`,`${br}4`];
    const rr=s.indep?[s[`r1${br}`],s[`r2${br}`],s[`r3${br}`]]:[s.r1a,s.r2a,s.r3a];
    const hubPortY=activeBr.length===2?(br==='a'?oltCY-10:oltCY+10):oltCY;

    drawWire(svg,hubX+HUB_W,hubPortY,colData[0].ctoX,brCY,T[`${br}1_in`],2);
    svg.appendChild(mkTxt(`RAMA ${br.toUpperCase()}`,{x:PAD+OLT_W+14+HUB_W+8,y:rowY-4,'font-family':"'IBM Plex Sans'",'font-size':8,'font-weight':700,fill:'#0066cc',opacity:.5,'letter-spacing':3}));

    ctoKeys.forEach((ck,ci)=>{
      const {colX,ctoX,colW}=colData[ci];
      const inV=T[ck+'_in'], passV=T[ck+'_pass'], tapV=T[ck+'_tap'], onuV=T[ck+'_onu'];
      const isLast=ci===3;
      const ratio=ci<3?rr[ci]:null;

      // Inter-CTO fiber
      if(!isLast){
        const nextCX=colData[ci+1].ctoX;
        const nextIn=T[ctoKeys[ci+1]+'_in'];
        drawWire(svg,ctoX+CTO_W,brCY,nextCX,brCY,nextIn,1.8);
        const mid=(ctoX+CTO_W+nextCX)/2;
        const fv=fmt(nextIn);
        svg.appendChild(mkTxt(fv?fv+' dBm':'CORTE',{x:mid,y:brCY-5,'text-anchor':'middle','font-family':"'IBM Plex Mono'",'font-size':7.5,'font-weight':500,fill:valC(nextIn)}));
      }
      drawCTO(svg,ctoX,rowY,ck,inV,onuV,'desbal',!isLast&&ratio!==null,passV,tapV,ratio);
      drawONUsBelow(svg,ctoX,rowY,ck,onuV,'desbal',colX,colW);
    });
  });

  drawLegend(svg,svgW,svgH);
}

// ════════════════════════════════════════════════════════
//  SHARED BUILDER for HubPreco + Fusionada
//  Layout: OLT top-left → trunk → Splitter/Bandeja centered top
//          From splitter bottom: angled drops fan out to each CTO below
//          CTOs spread horizontally, ONUs hang below each CTO
// ════════════════════════════════════════════════════════
function buildVertical(T, topo){
  const svg=document.getElementById('svg');
  while(svg.children.length>1) svg.removeChild(svg.lastChild);
  const s=STATE[topo];
  const isFus=topo==='fusionada';

  const activeCTOs=s.ctoKeys.filter(k=>s.ctoOn[k]);
  const n=activeCTOs.length;

  // ── Vertical zones ──────────────────────────────────
  const TOP_PAD    = PAD+14;
  const OLT_CY     = TOP_PAD+30;          // OLT center Y
  const TRUNK_H    = 40;                   // vertical trunk OLT→splitter
  const SP_CY      = OLT_CY+TRUNK_H;      // splitter center Y
  const SP_H       = 76;                   // splitter box height
  const SP_BOT     = SP_CY+SP_H/2;        // bottom of splitter box
  const DROP_V     = 50;                   // vertical drop segment below splitter
  const JUNCTION_Y = SP_BOT+DROP_V;       // Y where all drops split
  const DROP_ANGLE = 60;                   // extra vertical before CTO top
  const CTO_TOP_Y  = JUNCTION_Y+DROP_ANGLE; // top of all CTO boxes

  // ── CTO column widths ────────────────────────────────
  const CTO_GAP_H = 32;  // horizontal gap between CTO columns
  function ctoColW(ck){
    const nOnu=s.nOnu[ck]||0;
    return Math.max(CTO_W, nOnu>0 ? nOnu*ONU_W+(nOnu-1)*ONU_GAP : 0);
  }

  // Total width of all active CTO columns
  const totalCtoW = n>0
    ? activeCTOs.reduce((sum,ck)=>sum+ctoColW(ck),0) + (n-1)*CTO_GAP_H
    : CTO_W;

  // Minimum SVG width: enough for OLT+splitter on left, or CTO spread
  const SP_W = 78; // splitter box width
  const svgW = Math.max(totalCtoW + PAD*2, SP_W + PAD*2 + 60);

  // Center everything horizontally
  const svgCX = svgW/2;

  // Splitter box centered at top
  const SP_X = svgCX - SP_W/2;

  // CTO column x positions (spread evenly centered)
  const ctoStartX = svgCX - totalCtoW/2;
  const colX = [];    // left edge of each column
  const ctoCX = [];   // center x of each CTO box
  let cx = ctoStartX;
  activeCTOs.forEach(ck=>{
    const cw=ctoColW(ck);
    colX.push(cx);
    ctoCX.push(cx + (cw-CTO_W)/2 + CTO_W/2);  // center of CTO box
    cx += cw + CTO_GAP_H;
  });

  // OLT placed top-left, trunk goes horizontally then down to splitter
  const OLT_X   = PAD;
  const OLT_RIGHT= OLT_X+OLT_W;

  // Total SVG height
  function ctoTotalH(ck){
    const nOnu=s.nOnu[ck]||0;
    return CTO_H+(nOnu>0?ONU_DRP+ONU_H+10:8);
  }
  const maxCtoH = n>0 ? Math.max(...activeCTOs.map(ck=>ctoTotalH(ck))) : CTO_H;
  const svgH = CTO_TOP_Y + maxCtoH + PAD + 18;

  svg.setAttribute('viewBox',`0 0 ${svgW} ${svgH}`);
  svg.setAttribute('width',svgW); svg.setAttribute('height',svgH);
  svg.appendChild(mkEl('rect',{x:0,y:0,width:svgW,height:svgH,fill:'#f0f4f8'}));

  // ── OLT ─────────────────────────────────────────────
  drawOLT(svg, OLT_X, OLT_CY, T.olt);

  // ── Trunk OLT → Splitter ─────────────────────────────
  // Elbow: horizontal from OLT right to splitter center X, then vertical down
  const preV = isFus ? T.pre_bandeja : T.pre_hub;
  const jx   = SP_X + SP_W/2;  // splitter center x
  // horizontal segment
  svg.appendChild(mkEl('line',{x1:OLT_RIGHT,y1:OLT_CY,x2:jx,y2:OLT_CY,
    stroke:lineC(preV),'stroke-width':2.5,'stroke-linecap':'round',
    opacity:preV<=INF+5?0.2:1, filter:'url(#glow)'}));
  // vertical segment down to splitter top
  svg.appendChild(mkEl('line',{x1:jx,y1:OLT_CY,x2:jx,y2:SP_CY-SP_H/2,
    stroke:lineC(preV),'stroke-width':2.5,'stroke-linecap':'round',
    opacity:preV<=INF+5?0.2:1}));
  if(isFus) svg.appendChild(mkTxt('⋈ troncal',{x:jx+5,y:OLT_CY-6,
    'font-family':"'IBM Plex Mono'",'font-size':6.5,fill:'#059669'}));

  // ── Splitter/Bandeja box (centered top) ─────────────
  const outV = isFus
    ? T.bandejaOut
    : (preV<=INF+5?INF:preV-(s.lh8+s.lh8e+(s.F['sp-hub8']||0)));
  const boxLoss = isFus
    ? (s.ls8+s.ls8e+(s.F['sp-bandeja']||0)).toFixed(1)
    : (s.lh8+s.lh8e+(s.F['sp-hub8']||0)).toFixed(1);
  const boxFaultKey=isFus?'sp-bandeja':'sp-hub8';
  const boxFault=(s.F[boxFaultKey]||0)>0;

  const brdC  = boxFault?'#fb923c':isFus?'#34d399':'#93c5fd';
  const bgC   = boxFault?'#fff7ed':isFus?'#ecfdf5':'#eff6ff';
  const titC  = boxFault?'#c2410c':isFus?'#065f46':'#1e40af';

  const bx=mkEl('g',{filter:'url(#sh)'});
  bx.appendChild(mkEl('rect',{x:SP_X,y:SP_CY-SP_H/2,width:SP_W,height:SP_H,rx:8,
    fill:bgC,stroke:brdC,'stroke-width':boxFault?2.5:2}));
  // coloured top accent bar
  bx.appendChild(mkEl('rect',{x:SP_X,y:SP_CY-SP_H/2,width:SP_W,height:24,rx:7,fill:brdC}));
  bx.appendChild(mkEl('rect',{x:SP_X,y:SP_CY-SP_H/2+16,width:SP_W,height:8,fill:brdC})); // square bottom of accent
  const boxTitle=isFus?'BANDEJA SP 1×8':'HUB SP 1×8';
  bx.appendChild(mkTxt(boxTitle,{x:SP_X+SP_W/2,y:SP_CY-SP_H/2+12,'text-anchor':'middle',
    'font-family':"'IBM Plex Sans'",'font-size':9,'font-weight':700,fill:'white'}));
  bx.appendChild(mkTxt(isFus?'empalme fusionado':'preconectorizado',{
    x:SP_X+SP_W/2,y:SP_CY-SP_H/2+22,'text-anchor':'middle',
    'font-family':"'IBM Plex Mono'",'font-size':6.5,fill:'rgba(255,255,255,.8)'}));
  // loss row
  bx.appendChild(mkEl('line',{x1:SP_X+6,y1:SP_CY-4,x2:SP_X+SP_W-6,y2:SP_CY-4,stroke:brdC,opacity:.3,'stroke-width':1}));
  bx.appendChild(mkTxt('Atenuación',{x:SP_X+7,y:SP_CY+8,'font-family':"'IBM Plex Mono'",'font-size':7,fill:'#6b7280'}));
  bx.appendChild(mkTxt(`−${boxLoss} dB`,{x:SP_X+SP_W-6,y:SP_CY+8,'text-anchor':'end',
    'font-family':"'IBM Plex Mono'",'font-size':10,'font-weight':700,fill:boxFault?'#c2410c':titC}));
  if(boxFault) bx.appendChild(mkTxt('⚠ falla activa',{x:SP_X+SP_W/2,y:SP_CY+22,
    'text-anchor':'middle','font-family':"'IBM Plex Mono'",'font-size':7,fill:'#fb923c'}));
  // bottom port dot
  bx.appendChild(mkEl('circle',{cx:SP_X+SP_W/2,cy:SP_CY+SP_H/2,r:4,fill:'white',stroke:brdC,'stroke-width':2}));
  svg.appendChild(bx);

  // ── Short vertical from splitter bottom → junction point ──
  svg.appendChild(mkEl('line',{x1:jx,y1:SP_BOT,x2:jx,y2:JUNCTION_Y,
    stroke:lineC(outV),'stroke-width':2,opacity:outV<=INF+5?0.2:1,
    'stroke-dasharray':isFus?'6,3':'none'}));

  // Horizontal distribution bar at JUNCTION_Y (if >1 active CTO)
  if(n>1){
    const barX1 = ctoCX[0];
    const barX2 = ctoCX[n-1];
    svg.appendChild(mkEl('line',{x1:barX1,y1:JUNCTION_Y,x2:barX2,y2:JUNCTION_Y,
      stroke:lineC(outV),'stroke-width':2,opacity:outV<=INF+5?0.2:1,
      'stroke-dasharray':isFus?'6,3':'none'}));
  }

  // ── Each active CTO: vertical drop + CTO box + ONUs ──
  activeCTOs.forEach((ck,ri)=>{
    const ctoLeftX = colX[ri]+(ctoColW(ck)-CTO_W)/2;
    const ctoTopY  = CTO_TOP_Y;
    const ctoCenterX = ctoCX[ri];
    const inV  = T[ck+'_in'];
    const onuV = T[ck+'_onu'];

    // Tap dot on distribution bar
    svg.appendChild(mkEl('circle',{cx:ctoCenterX,cy:JUNCTION_Y,r:4,
      fill:'white',stroke:lineC(outV),'stroke-width':1.8}));

    // Vertical drop from distribution bar to CTO top
    const dropLine = mkEl('line',{
      x1:ctoCenterX, y1:JUNCTION_Y,
      x2:ctoCenterX, y2:ctoTopY,
      stroke:lineC(inV),'stroke-width':1.8,
      opacity:inV<=INF+5?0.2:1,
      'stroke-dasharray':isFus?'6,3':'none'
    });
    svg.appendChild(dropLine);

    // Power label beside the drop line (right side, midpoint)
    const dropMidY = (JUNCTION_Y+ctoTopY)/2;
    svg.appendChild(mkTxt(fmt(inV)?fmt(inV)+' dBm':'CORTE',{
      x:ctoCenterX+6, y:dropMidY,
      'font-family':"'IBM Plex Mono'",'font-size':7.5,'font-weight':600,
      fill:valC(inV)}));
    if(isFus) svg.appendChild(mkTxt('⋈',{
      x:ctoCenterX-7,y:dropMidY,
      'text-anchor':'middle','font-family':"'IBM Plex Mono'",'font-size':9,
      fill:'#059669',opacity:.8}));

    // Entry dot on CTO top edge
    svg.appendChild(mkEl('circle',{cx:ctoCenterX,cy:ctoTopY,r:4,
      fill:'white',stroke:lineC(inV),'stroke-width':2}));

    // CTO box
    drawCTO(svg, ctoLeftX, ctoTopY, ck, inV, onuV, topo, false, null, null, null);

    // ONUs below
    const cw = ctoColW(ck);
    drawONUsBelow(svg, ctoLeftX, ctoTopY, ck, onuV, topo, colX[ri], cw);
  });

  // Empty state message
  if(n===0){
    svg.appendChild(mkTxt('No hay CTOs activas — activá algunas en Vista → CTOs activas',{
      x:svgW/2,y:svgH/2,'text-anchor':'middle',
      'font-family':"'IBM Plex Sans'",'font-size':13,fill:'#94a3b8'}));
  }

  drawLegend(svg, svgW, svgH);
}

function buildHubPreco(T){ buildVertical(T,'hubpreco'); }
function buildFusionada(T){ buildVertical(T,'fusionada'); }

// ════════════════════════════════════════════════════════
//  RECALC
// ════════════════════════════════════════════════════════
function recalc(){
  const T=calc();
  const s=S();

  document.getElementById('h-olt').textContent=(fmt(T.olt)||'--')+' dBm';

  let fc=0; Object.values(s.F).forEach(v=>{ if(v>0||v===true) fc++; });
  const fe=document.getElementById('h-faults');
  fe.textContent=fc; fe.className='kpi-val '+(fc>0?'kv-er':'kv-ok');

  let onuOk=0, onuTot=0;
  s.ctoKeys.forEach(ck=>{
    const base=T[ck+'_onu']; const n=s.nOnu[ck];
    onuTot+=n;
    for(let i=1;i<=n;i++){
      const pk='p'+i;
      const rx=base<=INF+5?INF:base-onuDropLoss(ck,pk,currentTopo);
      const st=onuState(rx);
      if(st==='ok'||st==='weak') onuOk++;
    }
  });
  const oe=document.getElementById('h-onus');
  oe.textContent=`${onuOk}/${onuTot}`;
  oe.className='kpi-val '+(onuOk===onuTot?'kv-ok':onuOk>onuTot/2?'kv-wn':'kv-er');

  if(currentTopo==='desbal')    buildDesbal(T);
  if(currentTopo==='hubpreco')  buildHubPreco(T);
  if(currentTopo==='fusionada') buildFusionada(T);

  updateAttTables(T);
  setTimeout(fitZoom,30);
}

const PANEL_IDS=['cfg','view','drops','losses','faults','onus','log'];
function switchPanelTab(id){
  document.querySelectorAll('.pbody').forEach(t=>t.classList.remove('on'));
  document.querySelectorAll('.ptab').forEach(t=>t.classList.remove('on'));
  const b=document.getElementById('tab-'+id); if(b) b.classList.add('on');

  const ts=document.querySelectorAll('.ptab'); if(ts[i]) ts[i].classList.add('on');
}

    for(let i=1;i<=n;i++){

function updateAttTables(T){
  const s=S();
  s.ctoKeys.forEach(ck=>{
    const base=T[ck+'_onu']; const n=s.nOnu[ck];
    for(let i=1;i<=n;i++){
      const pk='p'+i;
      const rx=base<=INF+5?INF:base-onuDropLoss(ck,pk,currentTopo);
      const st=onuState(rx);
      const el=document.getElementById(`onu-st-${ck}-${pk}`);
      if(!el) continue;
      const map={ok:'✔ OK',weak:'⚡ DEB',crit:'⚠ CRIT',off:'✖ SIN'};
      const cc={ok:'var(--g)',weak:'var(--y)',crit:'var(--o)',off:'var(--r)'};
      el.textContent=map[st]||'···'; el.style.color=cc[st]||'var(--txt3)';
    }
  });
}

function doMeasure(){
  const T=calc(); const s=S();
  addLog('<span class="linf">══ MEDICIÓN ══</span>');
  addLog(`OLT TX: <span style="color:${valC(T.olt)}">${fmt(T.olt)} dBm</span>`);
  s.ctoKeys.forEach(ck=>{
    const iv=T[ck+'_in'], ov=T[ck+'_onu'];
    addLog(`<span class="lts">CTO ${ck.toUpperCase()} IN: </span><span style="color:${valC(iv)}">${fmt(iv)||'CORTE'} dBm</span>  <span class="lts">→ ONUs: </span><span style="color:${valC(ov)}">${fmt(ov)||'CORTE'} dBm</span>`);
  });
  switchPanelTab('log');
}

let logL=[];
function addLog(html){
  const now=new Date();
  const ts=[now.getHours(),now.getMinutes(),now.getSeconds()].map(n=>String(n).padStart(2,'0')).join(':');
  logL.push(`<div><span class="lts">[${ts}] </span>${html}</div>`);
  if(logL.length>150) logL.shift();
  const a=document.getElementById('log-area'); if(!a) return;
  a.innerHTML=logL.join(''); a.scrollTop=a.scrollHeight;
}
function clearLog(){ logL=[]; const a=document.getElementById('log-area'); if(a) a.innerHTML=''; }

function resetAll(){
  const s=S();
  Object.keys(s.F).forEach(k=>{ s.F[k]=typeof s.F[k]==='boolean'?false:0; });
  // Reset all range inputs
  document.querySelectorAll('.pbody input[type=range]').forEach(sl=>{ sl.value=0; });
  document.querySelectorAll('.tog').forEach(b=>b.className='tog off');
  if(s.brOn){ s.brOn.a=true; s.brOn.b=true; }
  const ta=document.getElementById('tog-a'); if(ta) ta.className='tog on';
  const tb=document.getElementById('tog-b'); if(tb) tb.className='tog on';
  addLog('<span class="lok">↺ Reset completo</span>');
  recalc();
}

let zoomLevel=1;
const ZOOM_MIN=0.2, ZOOM_MAX=3.5;

function setZoom(z){
  zoomLevel=Math.max(ZOOM_MIN,Math.min(ZOOM_MAX,z));
  document.getElementById('svg-wrap').style.transform=`scale(${zoomLevel})`;
  document.getElementById('zoom-pct').textContent=Math.round(zoomLevel*100)+'%';
}
function adjustZoom(d){ setZoom(zoomLevel+d); }
function fitZoom(){
  const area=document.getElementById('net-area');
  const svg=document.getElementById('svg');
  const svgW=parseFloat(svg.getAttribute('width'))||900;
  const svgH=parseFloat(svg.getAttribute('height'))||500;
  const z=Math.min((area.clientWidth-28)/svgW,(area.clientHeight-50)/svgH,ZOOM_MAX);
  setZoom(Math.max(ZOOM_MIN,z));
  area.scrollLeft=0; area.scrollTop=0;
}

document.getElementById('net-area').addEventListener('wheel',function(e){
  if(e.ctrlKey||e.metaKey){
    e.preventDefault();
    const d=e.deltaY<0?0.1:-0.1;
    const rect=this.getBoundingClientRect();
    const mx=e.clientX-rect.left+this.scrollLeft, my=e.clientY-rect.top+this.scrollTop;
    const pz=zoomLevel; setZoom(zoomLevel+d);
    this.scrollLeft=mx*(zoomLevel/pz)-(e.clientX-rect.left);
    this.scrollTop=my*(zoomLevel/pz)-(e.clientY-rect.top);
  }
},{passive:false});

(function(){
  let drag=false,sx,sy,slx,sly;
  const area=document.getElementById('net-area');
  area.addEventListener('mousedown',e=>{
    if(['INPUT','BUTTON','SELECT','LABEL'].includes(e.target.tagName)) return;
    drag=true; sx=e.clientX; sy=e.clientY; slx=area.scrollLeft; sly=area.scrollTop;
    area.style.cursor='grabbing'; e.preventDefault();
  });
  window.addEventListener('mousemove',e=>{ if(!drag) return; area.scrollLeft=slx-(e.clientX-sx); area.scrollTop=sly-(e.clientY-sy); });
  window.addEventListener('mouseup',()=>{ drag=false; area.style.cursor='grab'; });
})();

recalc();

</script>
